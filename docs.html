<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Documentation — TapeSim</title>
  <meta name="description" content="How to install, activate, and use TapeSim — the desktop order-flow simulator." />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="assets/app-icon.png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site">
    <div class="wrap">
      <div class="brand"><a href="index.html" style="color:inherit;text-decoration:none">Tape<span class="dot">Sim</span></a></div>
      <nav>
        <a href="index.html#features">Features</a>
        <a href="index.html#pricing">Pricing</a>
        <a href="docs.html">Docs</a>
        <a href="download.html">Download</a>
      </nav>
    </div>
  </header>

  <div class="docs-layout">
    <aside class="docs-sidebar">
      <h2>Documentation</h2>
      <nav id="docs-nav"><!-- links injected from PAGES below --></nav>
    </aside>
    <main class="docs-content" id="docs-content">
      <p class="docs-status">Loading…</p>
    </main>
  </div>

  <footer class="site">
    <div class="wrap">
      <div>
        <a href="terms.html">Terms</a>
        <a href="privacy.html">Privacy</a>
        <a href="refund.html">Refunds</a>
        <a href="mailto:support@tapesim.app">Support</a>
      </div>
      <div>© <span id="yr">2026</span> TapeSim</div>
    </div>
  </footer>

  <!-- Markdown renderer: marked 16.3.0 from cdnjs, pinned with SRI so it can't be
       tampered with. We author all the docs Markdown ourselves (no untrusted
       input), so no HTML sanitizer is needed. If this script fails to load, the
       onerror handler shows a fallback linking to the raw .md on GitHub. -->
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/marked/16.3.0/lib/marked.umd.min.js"
    integrity="sha384-28tGVU6cfNCYHN01DPkRbQ5zNcqr7cHx7RE2PA0Os8oQsE0H1dRIJBoGPX75oXDs"
    crossorigin="anonymous"
    onerror="window.__markedFailed=true"></script>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    // Ordered nav — the single source of truth for the sidebar + valid slugs.
    const PAGES = [
      { slug: 'getting-started',         title: 'Getting started' },
      { slug: 'activating-your-license', title: 'Activating your license' },
      { slug: 'downloading-data',        title: 'Downloading market data' },
      { slug: 'gap-play-examples',       title: 'Gap play examples' },
      { slug: 'loading-a-day',           title: 'Loading a day' },
      { slug: 'the-trading-screen',      title: 'The trading screen' },
      { slug: 'the-dom-ladder',          title: 'The DOM ladder' },
      { slug: 'keyboard-shortcuts',      title: 'Keyboard shortcuts' },
      { slug: 'where-data-is-stored',    title: 'Where data is stored' },
      { slug: 'troubleshooting',         title: 'Troubleshooting' },
    ];
    const DEFAULT_SLUG = PAGES[0].slug;
    const REPO_RAW = 'https://github.com/mrakgr/tapesim-website/blob/main/docs';

    const navEl = document.getElementById('docs-nav');
    const contentEl = document.getElementById('docs-content');

    // Build the sidebar.
    for (const p of PAGES) {
      const a = document.createElement('a');
      a.href = '#' + p.slug;
      a.textContent = p.title;
      a.dataset.slug = p.slug;
      navEl.appendChild(a);
    }

    function currentSlug() {
      const slug = (location.hash || '').replace(/^#/, '');
      return PAGES.some(p => p.slug === slug) ? slug : DEFAULT_SLUG;
    }

    function setActive(slug) {
      for (const a of navEl.querySelectorAll('a'))
        a.classList.toggle('active', a.dataset.slug === slug);
      const page = PAGES.find(p => p.slug === slug);
      document.title = (page ? page.title + ' — ' : '') + 'TapeSim Docs';
    }

    function showError(slug, detail) {
      contentEl.innerHTML =
        '<p class="docs-status err">Couldn’t load this page.</p>' +
        '<p class="docs-status">' + (detail || 'Try refreshing.') +
        ' You can also read it <a href="' + REPO_RAW + '/' + slug + '.md">on GitHub</a>.</p>';
    }

    async function render() {
      const slug = currentSlug();
      setActive(slug);
      if (window.__markedFailed || typeof marked === 'undefined') {
        showError(slug, 'The page renderer failed to load (network or CDN issue).');
        return;
      }
      contentEl.innerHTML = '<p class="docs-status">Loading…</p>';
      try {
        const resp = await fetch('docs/' + slug + '.md', { cache: 'no-cache' });
        if (!resp.ok) { showError(slug, 'The page returned ' + resp.status + '.'); return; }
        const md = await resp.text();
        contentEl.innerHTML = marked.parse(md);
        window.scrollTo(0, 0);
      } catch (e) {
        showError(slug, 'A network error occurred.');
      }
    }

    window.addEventListener('hashchange', render);
    // marked loads async; if it isn't ready yet, wait for the script then render.
    if (typeof marked === 'undefined' && !window.__markedFailed) {
      window.addEventListener('load', render);
    } else {
      render();
    }
  </script>
</body>
</html>
